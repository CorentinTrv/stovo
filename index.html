<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stovo</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f6f7f9; color: #1f2937;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0b1220; color: #e5e7eb; }
      .card { background: #111a2e; box-shadow: none; border: 1px solid #1f2a44; }
      .sub { color: #9ca3af; }
    }
    .card {
      background: #fff; border-radius: 18px; padding: 40px 32px; max-width: 380px; width: 100%;
      text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,.08);
    }
    .logo {
      width: 64px; height: 64px; border-radius: 16px; margin: 0 auto 18px;
      background: #0d9488; color: #fff; font-weight: 700; font-size: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    h1 { margin: 0 0 8px; font-size: 26px; }
    .sub { margin: 0 0 24px; color: #6b7280; line-height: 1.5; }
    .btn {
      display: inline-block; text-decoration: none; background: #0d9488; color: #fff;
      padding: 12px 22px; border-radius: 12px; font-weight: 600;
    }
    .btn:hover { background: #0f766e; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">S</div>
    <h1>Stovo</h1>
    <p class="sub">Application privée de gestion de stock.<br />L'accès se fait depuis l'application, protégée par un identifiant.</p>
    <a class="btn" href="app/">Ouvrir l'application</a>
  </main>
</body>
</html>
